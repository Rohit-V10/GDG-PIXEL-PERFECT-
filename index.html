<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gossip Girl Replica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=Parisienne&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section id="intro" class="intro-screen">
      <div class="intro-spotlight"></div>
      <div class="intro-art">
        <h1 class="intro-text">
          <span class="line-one">hey upper east siders...</span>
          <span class="line-two"><em>gossip girl here</em> - and i have</span>
          <span class="line-three">the biggest news ever</span>
        </h1>

        <button class="image-envelope intro-envelope scroll-landing" type="button" aria-label="Open envelope">
          <span class="env-shadow"></span>
          <span class="env-back"></span>
          <span class="env-top"></span>
          <span class="env-left"></span>
          <span class="env-right"></span>
          <span class="env-bottom"></span>
          <span class="env-highlight"></span>
          <span class="env-seal"></span>
        </button>
      </div>
    </section>

    <section id="landing" class="content-screen">
      <header class="top-nav">
        <a href="#landing" class="nav-pill">home</a>
        <a href="#tea" class="nav-pill">tea</a>
        <a href="#about" class="nav-pill">about</a>
      </header>

      <div class="hero-layer">
        <div class="hero-xoxo">XOXO</div>
        <div class="hero-gossip">gossip<br>girl</div>

        <button class="image-envelope hero-envelope scroll-tea wiggle-envelope" type="button" aria-label="Scroll to tea">
          <span class="env-shadow"></span>
          <span class="env-back"></span>
          <span class="env-top"></span>
          <span class="env-left"></span>
          <span class="env-right"></span>
          <span class="env-bottom"></span>
          <span class="env-highlight"></span>
          <span class="env-seal"></span>
        </button>
      </div>
    </section>

    <section id="tea" class="tea-screen">
      <header class="top-nav top-nav-overlay">
        <a href="#landing" class="nav-pill">home</a>
        <a href="#tea" class="nav-pill">tea</a>
        <a href="#about" class="nav-pill">about</a>
      </header>

      <div class="tea-top-layer">
        <div class="hero-xoxo tea-xoxo">XOXO</div>
        <div class="hero-gossip tea-gossip">gossip<br>girl</div>
      </div>

      <div class="tea-stage">
        <article class="tea-envelope draggable" style="top: 7%; left: 50%;" data-note="Spotted: a handwritten tip was tucked inside this one.">
          <button class="image-envelope paper-right" type="button" aria-label="Open gossip note">
            <span class="env-shadow"></span>
            <span class="env-back"></span>
            <span class="env-top"></span>
            <span class="env-left"></span>
            <span class="env-right"></span>
            <span class="env-bottom"></span>
            <span class="env-highlight"></span>
            <span class="env-seal"></span>
          </button>
          <div class="paper-sheet"></div>
          <div class="paper-note"></div>
        </article>

        <article class="tea-envelope draggable" style="top: 25%; left: 9%;" data-note="A blonde left the room early. You know who noticed.">
          <button class="image-envelope paper-right open-initial" type="button" aria-label="Open gossip note">
            <span class="env-shadow"></span>
            <span class="env-back"></span>
            <span class="env-top"></span>
            <span class="env-left"></span>
            <span class="env-right"></span>
            <span class="env-bottom"></span>
            <span class="env-highlight"></span>
            <span class="env-seal"></span>
          </button>
          <div class="paper-sheet"></div>
          <div class="paper-note"></div>
        </article>

        <article class="tea-envelope draggable" style="top: 24%; left: 76%;" data-note="One envelope. One rumor. One very public almost-scandal.">
          <button class="image-envelope" type="button" aria-label="Open gossip note">
            <span class="env-shadow"></span>
            <span class="env-back"></span>
            <span class="env-top"></span>
            <span class="env-left"></span>
            <span class="env-right"></span>
            <span class="env-bottom"></span>
            <span class="env-highlight"></span>
            <span class="env-seal"></span>
          </button>
          <div class="paper-sheet"></div>
          <div class="paper-note"></div>
        </article>

        <div class="googly-eyes">
          <div class="googly-eye"><span class="pupil"></span></div>
          <div class="googly-eye"><span class="pupil"></span></div>
        </div>

        <article class="tea-envelope draggable" style="top: 42%; left: 8%;" data-note="He said it was nothing. That usually means everything.">
          <button class="image-envelope" type="button" aria-label="Open gossip note">
            <span class="env-shadow"></span>
            <span class="env-back"></span>
            <span class="env-top"></span>
            <span class="env-left"></span>
            <span class="env-right"></span>
            <span class="env-bottom"></span>
            <span class="env-highlight"></span>
            <span class="env-seal"></span>
          </button>
          <div class="paper-sheet"></div>
          <div class="paper-note"></div>
        </article>

        <article class="tea-envelope draggable" style="top: 54%; left: 48%;" data-note="A tip landed right in the middle of brunch. Messy.">
          <button class="image-envelope paper-right open-initial" type="button" aria-label="Open gossip note">
            <span class="env-shadow"></span>
            <span class="env-back"></span>
            <span class="env-top"></span>
            <span class="env-left"></span>
            <span class="env-right"></span>
            <span class="env-bottom"></span>
            <span class="env-highlight"></span>
            <span class="env-seal"></span>
          </button>
          <div class="paper-sheet"></div>
          <div class="paper-note"></div>
        </article>

        <article class="tea-envelope draggable" style="top: 59%; left: 64%;" data-note="If the wax seal is broken, so is someone's alibi.">
          <button class="image-envelope" type="button" aria-label="Open gossip note">
            <span class="env-shadow"></span>
            <span class="env-back"></span>
            <span class="env-top"></span>
            <span class="env-left"></span>
            <span class="env-right"></span>
            <span class="env-bottom"></span>
            <span class="env-highlight"></span>
            <span class="env-seal"></span>
          </button>
          <div class="paper-sheet"></div>
          <div class="paper-note"></div>
        </article>

        <article class="tea-envelope draggable" style="top: 81%; left: 29%;" data-note="Another secret slipped through the doorman's hands.">
          <button class="image-envelope" type="button" aria-label="Open gossip note">
            <span class="env-shadow"></span>
            <span class="env-back"></span>
            <span class="env-top"></span>
            <span class="env-left"></span>
            <span class="env-right"></span>
            <span class="env-bottom"></span>
            <span class="env-highlight"></span>
            <span class="env-seal"></span>
          </button>
          <div class="paper-sheet"></div>
          <div class="paper-note"></div>
        </article>

        <div class="marquee-bar">
          <div class="marquee-track">
            <span>...xoxo gossip girl</span>
            <span>you know you love me ... ...xoxo gossip girl</span>
            <span>you know you love me ... ...xoxo gossip girl</span>
          </div>
        </div>
      </div>
    </section>

    <section id="about" class="about-screen">
      <header class="top-nav">
        <a href="#landing" class="nav-pill">home</a>
        <a href="#tea" class="nav-pill">tea</a>
        <a href="#about" class="nav-pill">about</a>
      </header>

      <div class="phone-wrap">
        <div class="nokia-phone">
          <div class="camera-dot"></div>
          <div class="camera-ring">
            <span class="ring-inner"></span>
          </div>
          <div class="brand">NOKIA</div>
          <div class="phone-screen-ui">
            <div class="signal-bar"></div>
            <div class="screen-time">7:04</div>
            <div class="screen-message typing-line" data-text="and who am i? that's one secret i'll never tell"></div>
            <div class="screen-footer left">options</div>
            <div class="screen-footer right">send</div>
            <div class="screen-grain"></div>
          </div>
          <div class="phone-controls">
            <div class="control-arc green"></div>
            <div class="control-arc blue"></div>
            <div class="control-arc red"></div>
            <div class="control-pad">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <div class="keypad">
            <button type="button">1</button>
            <button type="button">2 abc</button>
            <button type="button">3 def</button>
            <button type="button">4 ghi</button>
            <button type="button">5 jkl</button>
            <button type="button">6 mno</button>
            <button type="button">7 pqrs</button>
            <button type="button">8 tuv</button>
            <button type="button">9 wxyz</button>
            <button type="button">*</button>
            <button type="button">0</button>
            <button type="button">#</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
